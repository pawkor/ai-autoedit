services:
  autoframe:
    build: .
    image: autoframe:latest
    user: "${UID}:${GID}"
    ports:
      - "8000:8000"
    security_opt:
      - apparmor:unconfined
    volumes:
      - "${DATA_DIR}:/data"
      - ./webapp:/app/webapp
      - ./config.ini:/app/config.ini:ro
    environment:
      BROWSE_ROOT: /data
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LAST_FM_API_KEY: ${LAST_FM_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video, compute, utility]
    restart: unless-stopped
