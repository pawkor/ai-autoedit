# autoframe pipeline configuration
# All values here are defaults — CLI flags (--threshold, --max-scene, etc.) still take precedence.

[scene_detection]
# Sensitivity of the scene cut detector (PySceneDetect --threshold).
# Lower = detects more cuts (sensitive to subtle changes).
# Higher = detects only hard cuts.
threshold = 24

# Minimum duration of a detected scene. Shorter scenes are merged with the next.
# Use s suffix for seconds (e.g. 8s, 15s).
# Higher = fewer, longer scenes; lower = more granular cuts.
min_scene_len = 10s

[clip_prompts]
# One prompt per line. Indented lines are treated as continuation of the value.
# Edit to match your footage type (e.g. off-road, Alps, specific passes).
positive =
    scenic motorcycle road trip through mountains
    beautiful winding road with dramatic landscape
    motorcycle riding on coastal road with sea view
    epic travel photography open road horizon
    dramatic alpine pass road with mountains
    motorcycle adventure touring scenic route
    cinematic road with curves and natural scenery
    motorcycle POV riding winding mountain road high speed
    motorcycle following another rider on alpine pass
    KTM dashboard speedometer riding mountain curves
    rocky mountain pass road with guardrail riding POV
    two motorcycles riding together mountain road
    high altitude road riding with panoramic mountain view
    winding mountain pass Romania Transalpina
    motorcycle riding through narrow gorge canyon limestone rock walls towering
    road at bottom of deep canyon vertical cliffs both sides no shoulder
    tight canyon road rock face inches from motorcycle
    dramatic narrow gorge road carved between vertical limestone walls
    motorcycle POV narrow canyon road with rock walls close overhead

negative =
    boring flat highway with no scenery
    parking lot or gas station
    blurry or out of focus image
    dark concrete tunnel artificial lighting
    traffic jam or city street
    motorcycle stopped parked at rest
    rider checking phone navigation stopped
    group of motorcycles parked
    gravel parking lot no motorcycle visible
    static landscape photo no vehicle moving

[clip_scoring]
# Percentage of top-scoring scenes shown in the summary log (display only, no effect on output).
top_percent = 25

# Weight applied to negative prompts when calculating the final CLIP score.
# final_score = pos_score - neg_score * neg_weight
# Higher = negative scenes are penalized more aggressively.
# Lower = negative prompts have less influence.
neg_weight = 0.5

[scene_selection]
# Minimum CLIP score for a scene to be included in the highlight.
# Higher = only the best scenes, shorter highlight, may skip borderline shots.
# Lower = more inclusive, longer highlight, may include mediocre scenes.
threshold = 0.148

# Maximum seconds taken from a single scene clip.
# Higher = individual scenes can be longer.
# Lower = more variety, no single scene dominates.
max_scene_sec = 5

# Maximum total seconds selected from a single source file.
# Higher = one file can contribute more to the highlight.
# Lower = balances footage across multiple files.
max_per_file_sec = 60

# Per-file time limits for low-scoring files (score tiers).
# Files where top score < tier1_cutoff get at most tier1_limit seconds.
# Files where top score < tier2_cutoff get at most tier2_limit seconds.
# Files above tier2_cutoff use max_per_file_sec.
tier1_cutoff = 0.145
tier1_limit = 10
tier2_cutoff = 0.150
tier2_limit = 20

# Minimum clip duration in seconds. Clips shorter than this are skipped.
min_take_sec = 0.5

[video]
# Output resolution (width:height). 3840:2160 = 4K UHD.
# Upscaling to 4K gives significantly better YouTube compression quality.
resolution = 3840:2160

# Output framerate.
# Higher = smoother motion (recommended for action footage), larger file.
# Lower = smaller file, may look choppy for fast action.
framerate = 60

# Audio bitrate for encoded output streams.
audio_bitrate = 192k

# NVENC constant quality (lower = better quality, more bits; 0 = lossless).
# Typical range: 18 (high quality) – 28 (acceptable).
nvenc_cq = 18

# NVENC speed/quality preset (p1 = fastest, p7 = best quality/slowest).
# p4 is a good balance for RTX 3070 Ti.
nvenc_preset = p5

# libx264 CRF quality (lower = better; 0 = lossless, 23 = default).
# Used when NVENC is not available.
x264_crf = 15

# libx264 speed preset. Slower = better compression at same quality.
# Options: ultrafast superfast veryfast faster fast medium slow slower veryslow
x264_preset = fast

[intro_outro]
# Duration of intro and outro cards in seconds.
# Higher = more time on title screen; lower = shorter opener.
duration = 3

# Duration of fade in/out transitions in seconds.
fade_duration = 1

# Text displayed on the outro card.
outro_text = Editing powered by AI

# Font file used for drawtext in intro/outro.
font = ~/fonts/Caveat-Bold.ttf

# Font size for the intro first line (year / main title).
# Higher = larger text; lower = more fits on screen.
font_size_title = 120

# Font size for the intro second line (trip name / subtitle).
font_size_subtitle = 96

# Font size for the outro card text.
font_size_outro = 60

[music]
# Default directory with MP3/M4A music files.
dir = /data/music

# Music track volume mixed into the final video (0.0–1.0).
# Higher = music louder; lower = more of the original audio audible.
music_volume = 0.7

# Original video audio volume in the final mix (0.0–1.0).
original_volume = 0.3

# Duration of music fade-out at the end of the video in seconds.
fade_out_duration = 3

[instagram]
# Minimum time between Instagram Reel uploads (in hours).
# Instagram can penalise accounts that post Reels too frequently.
# Research suggests waiting at least 2–4 h between posts to avoid reach suppression.
# Set to 0 to disable the cooldown entirely.
min_hours_between_uploads = 4

[paths]
# Python virtual environment used by the pipeline.
venv = ~/highlight-env

# Working subdirectory created inside each day folder.
# Contains autocut/, frames/, csv/, trimmed/ and intermediate files.
work_subdir = _autoframe

# jellyfin-ffmpeg for nvenc
ffmpeg = /usr/lib/jellyfin-ffmpeg/ffmpeg
ffprobe = /usr/lib/jellyfin-ffmpeg/ffprobe




[shorts]
# Per-camera horizontal crop offset in pixels (positive = right, negative = left).
# Example: back camera mounted behind rider — shift left to keep rider in frame.
# Format: cam1:offset,cam2:offset
crop_x_offsets =
